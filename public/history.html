<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>History | WA Engine X</title>
  <link rel="stylesheet" href="/output.css" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;}
    body{background:#030712;color:#f8fafc;font-family:"Outfit",sans-serif;margin:0;min-height:100vh;}
    #bgCanvas{position:fixed;inset:0;z-index:0;pointer-events:none;}
    .glass{background:rgba(17,24,39,.7);backdrop-filter:blur(18px);border:1px solid rgba(255,255,255,.07);border-radius:1rem;}
    .glass-nav{background:rgba(8,12,22,.92);backdrop-filter:blur(24px);border-bottom:1px solid rgba(255,255,255,.06);}
    .nav-a{color:#94a3b8;font-weight:600;font-size:.875rem;padding:.4rem .85rem;border-radius:.5rem;text-decoration:none;white-space:nowrap;transition:background .2s,color .2s;}
    .nav-a:hover{background:rgba(255,255,255,.06);color:#fff;}
    .nav-a.on{background:rgba(52,211,153,.12);color:#34d399;}
    .btn{cursor:pointer;border:none;font-family:inherit;font-weight:700;border-radius:.75rem;transition:opacity .2s,transform .15s;}
    .btn:hover{opacity:.85;}
    input[type="date"]::-webkit-calendar-picker-indicator{filter:invert(1);opacity:.5;cursor:pointer;}
    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.12);border-radius:4px;}
  </style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<!-- TOP NAV -->
<nav class="glass-nav sticky top-0 z-50 w-full px-5 py-3 flex flex-row items-center justify-between gap-4">
  <div class="flex items-center gap-2 shrink-0">
    <div class="p-1.5 rounded-lg bg-gradient-to-br from-emerald-400 to-cyan-500">
      <svg class="w-4 h-4 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
    </div>
    <span class="font-bold text-white text-sm tracking-wide">WA Engine X</span>
  </div>
  <div class="flex items-center gap-1 overflow-x-auto" style="scrollbar-width:none">
    <a href="/d/aW5kZXg" class="nav-a">Dashboard</a>
    <a href="/d/Y29udGFjdHM" class="nav-a">Contacts</a>
    <a href="/d/bG9ncw" class="nav-a">Logs</a>
    <a href="/d/aGlzdG9yeQ" class="nav-a on">History</a>
  </div>
  <div style="display:flex;align-items:center;gap:.75rem;flex-shrink:0">
    <a href="/auth/logout" style="font-size:.75rem;padding:.35rem .85rem;border-radius:.5rem;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:#f87171;text-decoration:none;font-weight:600;white-space:nowrap">Sign Out</a>
  </div>
</nav>

<!-- MAIN -->
<div class="relative z-10 w-full max-w-screen-xl mx-auto px-4 md:px-6 py-6 flex flex-col gap-5">

  <!-- Chart Row -->
  <div class="glass p-5">
    <div class="flex flex-wrap items-center justify-between gap-3 mb-4">
      <h2 class="text-base font-bold text-white">Analytics Matrix</h2>
      <button id="toggleChartType" class="btn px-3 py-1.5 text-xs bg-white/5 border border-white/10 text-emerald-300">Switch to Pie</button>
    </div>
    <div style="height:220px"><canvas id="analyticsChart"></canvas></div>
  </div>

  <!-- Archive Table -->
  <div class="glass p-5">
    <!-- Header -->
    <div class="flex flex-wrap items-center justify-between gap-3 mb-5">
      <h2 class="text-lg font-bold text-white">Archived History</h2>
      <div class="flex gap-2 flex-wrap">
        <button id="btnExportCSV" class="btn px-3 py-2 text-sm bg-blue-500/15 border border-blue-500/30 text-blue-300">CSV</button>
        <button id="btnExportPDF" class="btn px-3 py-2 text-sm bg-indigo-500/15 border border-indigo-500/30 text-indigo-300">PDF</button>
        <button id="btnRefreshHistory" class="btn px-4 py-2 text-sm bg-gradient-to-r from-emerald-500 to-emerald-400 text-black shadow-[0_0_12px_rgba(16,185,129,.3)]">Refresh</button>
      </div>
    </div>

    <!-- Filters -->
    <div class="flex flex-wrap gap-3 mb-5">
      <input id="searchHistory" type="text" placeholder="Search phone or message..." class="flex-1 min-w-[160px] px-3 py-2 text-sm bg-black/40 text-gray-200 rounded-xl border border-white/10 focus:outline-none focus:border-emerald-500 transition" />
      <select id="filterCategory" class="px-3 py-2 text-sm bg-black/40 text-gray-200 rounded-xl border border-white/10 outline-none">
        <option value="">All Types</option>
        <option value="attendance">Attendance</option>
        <option value="fees_due">Fees Due</option>
        <option value="birthday">Birthday</option>
        <option value="announcement">Announcement</option>
        <option value="custom">Custom</option>
      </select>
      <select id="filterStatus" class="px-3 py-2 text-sm bg-black/40 text-gray-200 rounded-xl border border-white/10 outline-none">
        <option value="">All Outcomes</option>
        <option value="sent">Sent</option>
        <option value="failed">Failed</option>
        <option value="pending">Pending</option>
      </select>
      <input id="fromDate" type="date" class="px-3 py-2 text-sm bg-black/40 text-gray-200 rounded-xl border border-white/10 outline-none" />
      <input id="toDate" type="date" class="px-3 py-2 text-sm bg-black/40 text-gray-200 rounded-xl border border-white/10 outline-none" />
      <button id="btnClearFilter" class="btn px-3 py-2 text-sm bg-red-500/10 border border-red-500/20 text-red-400">Reset</button>
    </div>

    <!-- Table -->
    <div class="overflow-x-auto rounded-xl border border-white/5">
      <table class="w-full text-left text-xs">
        <thead class="bg-white/5 text-gray-500 uppercase tracking-wider border-b border-white/5">
          <tr>
            <th class="px-4 py-3">Node</th>
            <th class="px-4 py-3">Type</th>
            <th class="px-4 py-3 w-2/5">Message</th>
            <th class="px-4 py-3">Result</th>
            <th class="px-4 py-3">Date</th>
          </tr>
        </thead>
        <tbody id="historyList" class="divide-y divide-white/5 font-mono text-gray-300">
          <tr><td colspan="5" class="px-4 py-6 text-center text-gray-600">Loading...</td></tr>
        </tbody>
      </table>
    </div>
  </div>
</div>

<!-- THREE.JS BG -->
<script>
  const scene=new THREE.Scene(),cam=new THREE.PerspectiveCamera(65,innerWidth/innerHeight,.1,1000),ren=new THREE.WebGLRenderer({canvas:document.getElementById('bgCanvas'),alpha:true,antialias:true});
  ren.setSize(innerWidth,innerHeight);ren.setPixelRatio(Math.min(devicePixelRatio,2));
  const geo=new THREE.BufferGeometry(),N=500,pos=new Float32Array(N*3),col=new Float32Array(N*3),tc=[new THREE.Color('#3B82F6'),new THREE.Color('#10B981')];
  for(let i=0;i<N*3;i+=3){pos[i]=(Math.random()-.5)*40;pos[i+1]=(Math.random()-.5)*40;pos[i+2]=(Math.random()-.5)*20-5;const c=tc[~~(Math.random()*2)];col[i]=c.r;col[i+1]=c.g;col[i+2]=c.b;}
  geo.setAttribute('position',new THREE.BufferAttribute(pos,3));geo.setAttribute('color',new THREE.BufferAttribute(col,3));
  const pts=new THREE.Points(geo,new THREE.PointsMaterial({size:.08,vertexColors:true,transparent:true,opacity:.6,blending:THREE.AdditiveBlending}));
  scene.add(pts);cam.position.z=8;
  (function anim(){requestAnimationFrame(anim);pts.rotation.y+=.0003;ren.render(scene,cam);})();
  window.addEventListener('resize',()=>{cam.aspect=innerWidth/innerHeight;cam.updateProjectionMatrix();ren.setSize(innerWidth,innerHeight);});
</script>

<!-- HISTORY LOGIC -->
<script>
  Chart.defaults.color='#64748b';Chart.defaults.font.family='Outfit';
  let allHistory=[],summaryData=[],chart,chartMode='bar';
  const CM={attendance:'rgba(99,102,241,.8)',fees_due:'rgba(244,114,182,.8)',birthday:'rgba(6,182,212,.8)',announcement:'rgba(16,185,129,.8)',custom:'rgba(156,163,175,.8)'};
  const CAT_C={attendance:'text-indigo-300 bg-indigo-500/10 border-indigo-500/20',fees_due:'text-fuchsia-300 bg-fuchsia-500/10 border-fuchsia-500/20',birthday:'text-cyan-300 bg-cyan-500/10 border-cyan-500/20',announcement:'text-emerald-300 bg-emerald-500/10 border-emerald-500/20'};
  const ST_C={sent:'text-emerald-400',failed:'text-red-400',pending:'text-yellow-400'};
  function catBadge(c){return`<span class="px-1.5 py-0.5 text-[10px] rounded border ${CAT_C[c]||'text-gray-400 bg-white/5 border-white/10'} uppercase tracking-wide">${c||'custom'}</span>`;}
  function stBadge(s){return`<span class="${ST_C[s]||'text-gray-400'} font-bold text-[10px] uppercase">${s||'?'}</span>`;}

  async function loadHistory(){
    try{const r=await(await fetch('/logs/history')).json();allHistory=r.data||[];summaryData=r.summary||[];applyFilters();renderChart();}catch(e){}
  }

  function applyFilters(){
    const term=document.getElementById('searchHistory').value.toLowerCase();
    const cat=document.getElementById('filterCategory').value;
    const stat=document.getElementById('filterStatus').value;
    const from=document.getElementById('fromDate').value?new Date(document.getElementById('fromDate').value):null;
    const to=document.getElementById('toDate').value?new Date(document.getElementById('toDate').value):null;
    const list=allHistory.filter(l=>{
      const d=new Date(l.sent_at||l.created_at);
      return(!stat||l.status===stat)&&(!cat||l.category===cat)&&(!term||(l.phone||'').includes(term)||(l.message_text||'').toLowerCase().includes(term))&&(!from||d>=from)&&(!to||d<=to);
    });
    document.getElementById('historyList').innerHTML=list.length?list.map(l=>`<tr class="hover:bg-white/[.03] transition-colors"><td class="px-4 py-2.5 font-sans">${l.name?l.name+'('+l.phone+')':l.phone}</td><td class="px-4 py-2.5">${catBadge(l.category)}</td><td class="px-4 py-2.5 text-emerald-200 font-sans max-w-xs truncate">${(l.message_text||'').substring(0,80).replace(/</g,'&lt;')}</td><td class="px-4 py-2.5">${stBadge(l.status)}</td><td class="px-4 py-2.5 text-gray-500 font-sans">${new Date(l.sent_at).toLocaleDateString()}</td></tr>`).join(''):`<tr><td colspan="5" class="px-4 py-8 text-center text-gray-600">No history found.</td></tr>`;
  }

  function renderChart(){
    const ctx=document.getElementById('analyticsChart').getContext('2d');
    if(chart)chart.destroy();
    if(!summaryData.length)return;
    if(chartMode==='bar'){
      const G={};summaryData.forEach(r=>{if(!G[r.category])G[r.category]={};G[r.category][r.month]=r.total;});
      const months=[...new Set(summaryData.map(r=>r.month))];
      chart=new Chart(ctx,{type:'bar',data:{labels:months,datasets:Object.keys(G).map(c=>({label:c,data:months.map(m=>G[c][m]||0),backgroundColor:CM[c]||'rgba(156,163,175,.7)',borderRadius:4}))},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}},scales:{x:{grid:{display:false}},y:{beginAtZero:true,grid:{color:'rgba(255,255,255,.04)'}}}}});
    }else{
      const T={};summaryData.forEach(r=>T[r.category]=(T[r.category]||0)+r.total);
      chart=new Chart(ctx,{type:'pie',data:{labels:Object.keys(T),datasets:[{data:Object.values(T),backgroundColor:Object.keys(T).map(k=>CM[k]||'rgba(156,163,175,.7)'),borderColor:'#030712',borderWidth:3}]},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{position:'bottom',labels:{font:{size:10}}}}}});
    }
  }

  document.getElementById('toggleChartType').onclick=function(){chartMode=chartMode==='bar'?'pie':'bar';this.textContent=chartMode==='bar'?'Switch to Pie':'Switch to Bar';renderChart();};
  document.getElementById('btnRefreshHistory').onclick=loadHistory;
  document.getElementById('searchHistory').oninput=applyFilters;
  document.getElementById('filterCategory').onchange=applyFilters;
  document.getElementById('filterStatus').onchange=applyFilters;
  document.getElementById('btnClearFilter').onclick=()=>{document.getElementById('searchHistory').value='';document.getElementById('filterCategory').value='';document.getElementById('filterStatus').value='';document.getElementById('fromDate').value='';document.getElementById('toDate').value='';applyFilters();};

  document.getElementById('btnExportCSV').onclick=()=>{
    const rows=[['Phone','Category','Status','Message','Date']];
    allHistory.forEach(l=>rows.push([l.phone,l.category||'',l.status||'',(l.message_text||'').replace(/[\r\n]/g,' '),l.sent_at||'']));
    const a=document.createElement('a');a.href=URL.createObjectURL(new Blob([rows.map(r=>r.map(x=>`"${x}"`).join(',')).join('\n')],{type:'text/csv'}));a.download='wa_history.csv';a.click();
  };
  document.getElementById('btnExportPDF').onclick=async()=>{
    const{jsPDF}=window.jspdf;const doc=new jsPDF({orientation:'landscape'});doc.text('WA Engine X — History Export',14,15);doc.setFontSize(9);let y=25;
    allHistory.slice(0,80).forEach(l=>{doc.text(`${l.phone||''} | ${l.category||''} | ${l.status||''} | ${(l.message_text||'').substring(0,80)} | ${l.sent_at||''}`,14,y);y+=6;if(y>190){doc.addPage();y=15;}});
    doc.save('wa_history.pdf');
  };

  loadHistory();
</script>
</body>
</html>
