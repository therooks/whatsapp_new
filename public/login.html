<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | WA Engine X</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #030712;
      font-family: "Outfit", sans-serif;
      color: #f8fafc;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }
    /* Animated mesh background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 50% at 20% 40%, rgba(16,185,129,0.08) 0%, transparent 60%),
        radial-gradient(ellipse 60% 40% at 80% 70%, rgba(14,165,233,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 50% 0%, rgba(99,102,241,0.05) 0%, transparent 60%);
      z-index: 0;
    }
    /* Grid lines */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px);
      background-size: 60px 60px;
      z-index: 0;
    }

    .login-wrap {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      padding: 1rem;
    }

    /* Brand */
    .brand {
      display: flex;
      align-items: center;
      gap: .75rem;
      justify-content: center;
      margin-bottom: 2.5rem;
    }
    .brand-icon {
      width: 2.5rem;
      height: 2.5rem;
      border-radius: .625rem;
      background: linear-gradient(135deg, #10b981, #0ea5e9);
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 0 20px rgba(16,185,129,.4);
    }
    .brand-icon svg { width: 1.25rem; height: 1.25rem; color: #fff; display: block; }
    .brand-name { font-size: 1.5rem; font-weight: 700; color: #fff; letter-spacing: .03em; }
    .brand-sub { font-size: .75rem; color: #6b7280; text-transform: uppercase; letter-spacing: .12em; text-align: center; margin-top: -.25rem; }

    /* Card */
    .card {
      background: rgba(17,24,39,0.8);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid rgba(255,255,255,.08);
      border-top: 1px solid rgba(255,255,255,.12);
      border-radius: 1.25rem;
      padding: 2rem;
      box-shadow: 0 32px 64px -12px rgba(0,0,0,.8), 0 0 0 1px rgba(255,255,255,.03) inset;
    }
    .card-title {
      font-size: 1.25rem;
      font-weight: 700;
      color: #fff;
      margin-bottom: .35rem;
    }
    .card-sub { font-size: .8rem; color: #6b7280; margin-bottom: 1.75rem; }

    /* Form */
    .form-group { margin-bottom: 1.1rem; }
    label { display: block; font-size: .75rem; font-weight: 600; color: #9ca3af; text-transform: uppercase; letter-spacing: .08em; margin-bottom: .45rem; }
    .input-wrap { position: relative; }
    .input-icon { position: absolute; left: .875rem; top: 50%; transform: translateY(-50%); color: #4b5563; display: flex; }
    .input-icon svg { width: 1rem; height: 1rem; display: block; }
    input[type="text"], input[type="password"] {
      width: 100%;
      padding: .7rem .875rem .7rem 2.5rem;
      background: rgba(0,0,0,.4);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: .625rem;
      color: #e2e8f0;
      font-family: inherit;
      font-size: .875rem;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: rgba(16,185,129,.5);
      box-shadow: 0 0 0 3px rgba(16,185,129,.08);
    }

    /* Error */
    #errorMsg {
      display: none;
      align-items: center;
      gap: .5rem;
      background: rgba(239,68,68,.08);
      border: 1px solid rgba(239,68,68,.2);
      border-radius: .5rem;
      padding: .65rem .875rem;
      font-size: .8rem;
      color: #fca5a5;
      margin-bottom: 1rem;
    }
    #errorMsg.show { display: flex; }
    #errorMsg svg { width: 1rem; height: 1rem; flex-shrink: 0; display: block; }

    /* Button */
    .btn-login {
      width: 100%;
      padding: .8rem;
      background: linear-gradient(135deg, #10b981, #059669);
      color: #fff;
      font-family: inherit;
      font-weight: 700;
      font-size: .95rem;
      border: none;
      border-radius: .625rem;
      cursor: pointer;
      transition: opacity .2s, transform .15s, box-shadow .2s;
      box-shadow: 0 0 20px rgba(16,185,129,.3);
      margin-top: 1.25rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: .5rem;
      letter-spacing: .02em;
    }
    .btn-login:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 0 28px rgba(16,185,129,.45); }
    .btn-login:active { transform: translateY(0); }
    .btn-login:disabled { opacity: .6; cursor: not-allowed; transform: none; }
    .btn-login svg { width: 1rem; height: 1rem; display: block; }
    .spinner { width: 1rem; height: 1rem; border: 2px solid rgba(255,255,255,.3); border-top-color: #fff; border-radius: 50%; animation: spin .6s linear infinite; display: none; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Divider hint */
    .hint {
      text-align: center;
      margin-top: 1.5rem;
      font-size: .75rem;
      color: #374151;
    }
    .hint span { color: #4b5563; }

    /* Floating orbs */
    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 1;
      animation: float 8s ease-in-out infinite;
    }
    .orb-1 { width: 300px; height: 300px; background: rgba(16,185,129,.06); top: -80px; left: -80px; }
    .orb-2 { width: 250px; height: 250px; background: rgba(14,165,233,.05); bottom: -60px; right: -60px; animation-delay: -4s; }
    @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-20px)} }
  </style>
</head>
<body>
  <!-- Orbs -->
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="login-wrap">
    <!-- Brand -->
    <div class="brand">
      <div>
        <div class="flex" style="display:flex;align-items:center;gap:.75rem;justify-content:center">
          <div class="brand-icon">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:1.25rem;height:1.25rem;color:#fff"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
          </div>
          <span class="brand-name">WA Engine X</span>
        </div>
        <div class="brand-sub">WhatsApp Gateway Control Panel</div>
      </div>
    </div>

    <!-- Card -->
    <div class="card">
      <h1 class="card-title">Welcome back</h1>
      <p class="card-sub">Sign in to access your dashboard</p>

      <!-- Error -->
      <div id="errorMsg">
        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
        <span id="errorText">Invalid credentials</span>
      </div>

      <form id="loginForm" autocomplete="off">
        <div class="form-group">
          <label for="username">Username</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:1rem;height:1rem"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
            </span>
            <input type="text" id="username" name="username" placeholder="Enter username" required autocomplete="username" />
          </div>
        </div>

        <div class="form-group">
          <label for="password">Password</label>
          <div class="input-wrap">
            <span class="input-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:1rem;height:1rem"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            </span>
            <input type="password" id="password" name="password" placeholder="Enter password" required autocomplete="current-password" />
          </div>
        </div>

        <button type="submit" class="btn-login" id="btnLogin">
          <div class="spinner" id="spinner"></div>
          <svg id="btnIcon" fill="none" stroke="currentColor" viewBox="0 0 24 24" style="width:1rem;height:1rem"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 16l-4-4m0 0l4-4m-4 4h14m-5 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h7a3 3 0 013 3v1"/></svg>
          <span id="btnText">Sign In</span>
        </button>
      </form>

      <div class="hint">Default: <span>admin</span> / <span>admin123</span></div>
    </div>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btnLogin');
      const spinner = document.getElementById('spinner');
      const btnIcon = document.getElementById('btnIcon');
      const btnText = document.getElementById('btnText');
      const errDiv = document.getElementById('errorMsg');
      const errText = document.getElementById('errorText');

      // Loading state
      btn.disabled = true;
      spinner.style.display = 'block';
      btnIcon.style.display = 'none';
      btnText.textContent = 'Signing in...';
      errDiv.classList.remove('show');

      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;

      try {
        const res = await fetch('/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password }),
          credentials: 'same-origin'
        });
        const data = await res.json();

        if (data.success) {
          btnText.textContent = 'Redirecting...';
          window.location.href = data.redirect || '/d/aW5kZXg';
        } else {
          errText.textContent = data.message || 'Invalid username or password';
          errDiv.classList.add('show');
          btn.disabled = false;
          spinner.style.display = 'none';
          btnIcon.style.display = 'block';
          btnText.textContent = 'Sign In';
        }
      } catch (err) {
        errText.textContent = 'Server error. Please try again.';
        errDiv.classList.add('show');
        btn.disabled = false;
        spinner.style.display = 'none';
        btnIcon.style.display = 'block';
        btnText.textContent = 'Sign In';
      }
    });
  </script>
</body>
</html>
